# DocPortal nginx 리버스 프록시 설정
# 설치 위치: /etc/nginx/sites-available/docportal
# 적용: sudo ln -s /etc/nginx/sites-available/docportal /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS를 쓰려면 사내 인증서를 받아 listen 443 ssl 블록으로 바꾸고
# systemd 유닛에서 DOCPORTAL_SECURE_COOKIES=1 을 켜세요.

server {
    listen 80;
    server_name docs.example.com;   # 사내 DNS 이름으로 수정 (IP로 접속하면 _ 로 두어도 됨)

    # 업로드 용량 제한 없음 정책 (운영 방침)
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 대용량 업로드·문서 변환 대기
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 정적 파일은 nginx가 직접 서빙 (선택 최적화)
    location /static/ {
        alias /opt/docportal/app/static/;
        expires 1h;
    }
}
